<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梦幻告白 - 李梦依莎</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at top, #1a1a3e 0%, #0f0f2a 40%, #050510 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #050510;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }
        #cover.hide {
            opacity: 0;
            pointer-events: none;
        }
        .envelope-wrapper {
            position: relative;
            width: min(80vw, 600px);
        }
        .envelope-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        .heart-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 13%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* 移动端取消高亮 */
        }
        .heart-btn:hover {
            transform: translate(-50%, -50%) scale(1.15);
        }
        .heart-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        .tip {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        @media (max-width: 768px) {
            .tip {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 开场信封封面 -->
    <div id="cover">
        <div class="envelope-wrapper">
            <img src="envelope.jpg" alt="告白信封" class="envelope-img">
            <button id="startBtn" class="heart-btn"></button>
        </div>
        <p class="tip">点击爱心 开启惊喜</p>
    </div>

    <!-- 注意：audio 标签必须闭合！ -->
    <audio id="bgMusic" src="music.mp3" loop></audio>
    <canvas id="rain"></canvas>

    <script>
    (() => {
        'use strict';
        const canvas = document.getElementById('rain');
        const ctx = canvas.getContext('2d');
        const bgMusic = document.getElementById('bgMusic');
        const cover = document.getElementById('cover');
        const startBtn = document.getElementById('startBtn');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        const PI = Math.PI;
        const PI2 = PI * 2;
        const CX = () => canvas.width / 2;
        const CY = () => canvas.height / 2;

        // ==================== 状态控制 ====================
        let gameState = 'wait';        // wait:等待点击  countdown:倒计时  main:主动画
        let countdownStartTime = 0;
        let startTime = 0;
        let mainAlpha = 0;            // 主动画淡入透明度

        // ==================== 星空与流星 ====================
        let stars = [];
        let meteors = [];
        let secretDots = [];
        const STAR_COUNT = 150;
        const METEOR_SPAWN_RATE = 0.015;

        function createStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 0.5 + Math.random() * 1.5,
                    alpha: 0.3 + Math.random() * 0.7,
                    twinkleSpeed: 0.005 + Math.random() * 0.01,
                    twinklePhase: Math.random() * PI2
                });
            }
        }

        function createSecretDots() {
            secretDots = [];
            const off = document.createElement('canvas');
            const octx = off.getContext('2d');
            off.width = canvas.width;
            off.height = canvas.height;
            octx.fillStyle = '#fff';
            octx.font = 'bold 80px "Microsoft YaHei", sans-serif';
            octx.textAlign = 'right';
            octx.textBaseline = 'bottom';
            octx.fillText('莎', canvas.width - 40, canvas.height - 30);
            
            const imgData = octx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    const alpha = data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 100) {
                        secretDots.push({
                            x, y,
                            size: 0.8,
                            alpha: 0.25 + Math.random() * 0.2
                        });
                    }
                }
            }
        }

        function createMeteor() {
            meteors.push({
                x: Math.random() * canvas.width + canvas.width * 0.3,
                y: Math.random() * canvas.height * 0.5,
                length: 80 + Math.random() * 100,
                speed: 8 + Math.random() * 6,
                angle: PI * 1.25,
                alpha: 0.8
            });
        }

        function drawStars() {
            for (let s of stars) {
                s.twinklePhase += s.twinkleSpeed;
                const alpha = s.alpha * (0.6 + 0.4 * Math.sin(s.twinklePhase));
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 2;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, PI2);
                ctx.fill();
                ctx.restore();
            }
            for (let d of secretDots) {
                ctx.save();
                ctx.globalAlpha = d.alpha * (0.7 + 0.3 * Math.sin(Date.now() * 0.002));
                ctx.fillStyle = '#ffd7e6';
                ctx.shadowColor = '#ffb6d5';
                ctx.shadowBlur = 1.5;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, PI2);
                ctx.fill();
                ctx.restore();
            }
        }

        function updateDrawMeteors() {
            if (Math.random() < METEOR_SPAWN_RATE) {
                createMeteor();
            }
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                m.x += Math.cos(m.angle) * m.speed;
                m.y += Math.sin(m.angle) * m.speed;
                m.alpha -= 0.015;
                
                if (m.alpha <= 0 || m.x < -100 || m.y > canvas.height + 100) {
                    meteors.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = m.alpha;
                const grad = ctx.createLinearGradient(
                    m.x, m.y,
                    m.x - Math.cos(m.angle) * m.length,
                    m.y - Math.sin(m.angle) * m.length
                );
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(
                    m.x - Math.cos(m.angle) * m.length,
                    m.y - Math.sin(m.angle) * m.length
                );
                ctx.stroke();
                ctx.restore();
            }
        }

        // ==================== 倒计时烟花 ====================
        let fireworks = [];

        function createHeartFirework() {
            const count = 120;
            for (let i = 0; i < count; i++) {
                const t = (i / count) * PI2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                const scale = 8;
                fireworks.push({
                    x: CX(),
                    y: CY(),
                    vx: x * scale * 0.08 + (Math.random()-0.5)*2,
                    vy: y * scale * 0.08 + (Math.random()-0.5)*2,
                    size: 2.5,
                    alpha: 1,
                    gravity: 0.03,
                    hue: 340 + Math.random() * 20,
                    type: 'heart'
                });
            }
        }

        function createStarFirework() {
            const count = 200;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * PI2;
                const speed = 2 + Math.random() * 5;
                fireworks.push({
                    x: CX(),
                    y: CY(),
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 1 + Math.random() * 1.5,
                    alpha: 1,
                    gravity: 0.02,
                    hue: 50 + Math.random() * 20,
                    type: 'star'
                });
            }
        }

        function createColorFirework() {
            const count = 180;
            const baseHue = Math.random() * 360;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * PI2 + Math.random()*0.1;
                const speed = 3 + Math.random() * 4;
                fireworks.push({
                    x: CX(),
                    y: CY(),
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 3,
                    alpha: 1,
                    gravity: 0.025,
                    hue: baseHue + Math.random() * 60,
                    type: 'color'
                });
            }
        }

        function updateDrawFireworks() {
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const f = fireworks[i];
                f.vy += f.gravity;
                f.x += f.vx;
                f.y += f.vy;
                f.alpha -= 0.012;
                f.vx *= 0.99;

                if (f.alpha <= 0) {
                    fireworks.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = Math.max(0, f.alpha);
                ctx.fillStyle = `hsl(${f.hue}, 90%, 75%)`;
                ctx.shadowColor = `hsl(${f.hue}, 100%, 70%)`;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.size, 0, PI2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawCountdownNumber(num) {
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold ${Math.min(canvas.width * 0.3, 200)}px "Microsoft YaHei", sans-serif`;
            
            ctx.shadowColor = '#ffb6d5';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#ffffff';
            
            const scale = 1 + 0.1 * Math.sin(Date.now() * 0.005);
            ctx.translate(CX(), CY());
            ctx.scale(scale, scale);
            ctx.translate(-CX(), -CY());
            
            ctx.fillText(num, CX(), CY());
            ctx.restore();
        }

        // ==================== 主动画背景元素 ====================
        const fontSize = 28;
        const letters = ['I', 'L', 'O', 'V', 'E', 'Y', 'O', 'U'];
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];
        let dropSpeeds = [];
        function initRain() {
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            dropSpeeds = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * -80);
                dropSpeeds[i] = 0.7 + Math.random() * 0.35;
            }
        }
        initRain();
        let rainTimer = 0;
        let lastFrameTime = 0;
        const dotSpacing = 5;
        const dotRadius = 2;

        const STAGE0_END = 2000;
        const STAGE1_END = 4000;
        const STAGE2_END = 5000;
        const STAGE3_END = 7500;
        const STAGE4_END = 8500;
        const TEXT_START = 9500;
        const TEXT_DURATION = 2000;

        function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
        function easeInCubic(t) { return t * t * t; }
        function easeInOutQuad(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
        function easeOutSine(t) { return Math.sin((t * PI) / 2); }

        // 飘落爱心
        let fallHearts = [];
        const FALL_HEART_COUNT = 45;
        function createFallHearts() {
            fallHearts = [];
            for (let i = 0; i < FALL_HEART_COUNT; i++) {
                fallHearts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 3 + Math.random() * 7,
                    speedY: 0.25 + Math.random() * 0.5,
                    swingSpeed: 0.002 + Math.random() * 0.004,
                    swingOffset: Math.random() * PI2,
                    alpha: 0.12 + Math.random() * 0.28,
                    hue: 330 + Math.random() * 30
                });
            }
        }
        function drawMiniHeart(cx, cy, size) {
            ctx.beginPath();
            const s = size;
            ctx.moveTo(cx, cy + s * 0.5);
            ctx.bezierCurveTo(cx - s, cy - s * 0.2, cx - s * 0.8, cy - s, cx, cy - s * 0.4);
            ctx.bezierCurveTo(cx + s * 0.8, cy - s, cx + s, cy - s * 0.2, cx, cy + s * 0.5);
            ctx.fill();
        }
        function updateDrawFallHearts() {
            for (let p of fallHearts) {
                p.y += p.speedY;
                p.swingOffset += p.swingSpeed;
                p.x += Math.sin(p.swingOffset) * 0.3;
                if (p.y > canvas.height + 20) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
                if (p.x < -20) p.x = canvas.width + 20;
                if (p.x > canvas.width + 20) p.x = -20;
                ctx.save();
                ctx.globalAlpha = p.alpha * mainAlpha;
                ctx.fillStyle = `hsl(${p.hue}, 80%, 78%)`;
                ctx.shadowColor = `hsl(${p.hue}, 90%, 70%)`;
                ctx.shadowBlur = 6;
                drawMiniHeart(p.x, p.y, p.size);
                ctx.restore();
            }
        }

        // 萤火虫
        let fireflies = [];
        const FIREFLY_COUNT = 80;
        function createFireflies() {
            fireflies = [];
            for (let i = 0; i < FIREFLY_COUNT; i++) {
                fireflies.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: 0.6 + Math.random() * 1.4,
                    vx: (Math.random() - 0.5) * 0.25,
                    vy: (Math.random() - 0.5) * 0.25,
                    alpha: Math.random(),
                    alphaSpeed: 0.003 + Math.random() * 0.006,
                    phase: Math.random() * PI2
                });
            }
        }
        function updateDrawFireflies() {
            for (let p of fireflies) {
                p.x += p.vx;
                p.y += p.vy;
                p.phase += p.alphaSpeed;
                p.alpha = 0.15 + Math.sin(p.phase) * 0.45;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.alpha) * mainAlpha;
                ctx.fillStyle = '#FFF2B8';
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, PI2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 名字点阵
        const nameText = '李梦依莎';
        const nameSize = 180;
        let nameDots = [];
        let nameTextWidth = 0;
        let nameTextLeft = 0;
        let dissolveDots = [];
        function createNameDots() {
            nameDots = [];
            const off = document.createElement('canvas');
            const octx = off.getContext('2d');
            off.width = canvas.width;
            off.height = canvas.height;
            octx.fillStyle = '#fff';
            octx.font = `bold ${Math.min(nameSize, canvas.width*0.2)}px "Microsoft YaHei", "PingFang SC", "黑体", sans-serif`;
            octx.textAlign = 'center';
            octx.textBaseline = 'middle';
            octx.fillText(nameText, CX(), CY());
            nameTextWidth = octx.measureText(nameText).width;
            nameTextLeft = (canvas.width - nameTextWidth) / 2;
            const imgData = octx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let y = 0; y < canvas.height; y += dotSpacing) {
                for (let x = 0; x < canvas.width; x += dotSpacing) {
                    const alpha = data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 128) nameDots.push({ x, y, baseY: y });
                }
            }
        }
        function drawNameSweep(progress) {
            const eased = easeOutSine(progress);
            const sweepX = nameTextLeft + nameTextWidth * eased;
            const glowWidth = 120;
            ctx.save();
            ctx.globalAlpha = mainAlpha;
            ctx.shadowColor = '#ffb6d5';
            ctx.shadowBlur = 15;
            for (let p of nameDots) {
                if (p.x <= sweepX) {
                    const dist = sweepX - p.x;
                    let alpha = 1;
                    if (dist < glowWidth) {
                        alpha = dist / glowWidth;
                    }
                    ctx.globalAlpha = alpha * 0.95 * mainAlpha;
                    ctx.fillStyle = 'rgba(255, 240, 248, 1)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, dotRadius, 0, PI2);
                    ctx.fill();
                }
            }
            const grad = ctx.createLinearGradient(sweepX - glowWidth, 0, sweepX + glowWidth, 0);
            grad.addColorStop(0, 'rgba(255, 200, 225, 0)');
            grad.addColorStop(0.5, 'rgba(255, 220, 235, 0.4)');
            grad.addColorStop(1, 'rgba(255, 200, 225, 0)');
            ctx.globalAlpha = mainAlpha;
            ctx.fillStyle = grad;
            ctx.fillRect(sweepX - glowWidth, CY() - nameSize*0.7, glowWidth*2, nameSize*1.4);
            ctx.restore();
        }

        // 溶解 + 心形爆炸
        let explodeHearts = [];
        let explodeTriggered = false;
        function initDissolve() {
            dissolveDots = nameDots.map(p => ({
                x: p.x,
                y: p.y,
                vx: (Math.random() - 0.5) * 0.8,
                vy: Math.random() * 0.5 + 0.3,
                gravity: 0.015,
                alpha: 1,
                delay: Math.random() * 0.4
            }));
        }
        function createHeartExplosion() {
            explodeHearts = [];
            const count = 150;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * PI2;
                const speed = 1 + Math.random() * 4;
                explodeHearts.push({
                    x: CX(),
                    y: CY(),
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 1,
                    size: 2 + Math.random() * 4,
                    alpha: 1,
                    gravity: 0.025,
                    hue: 330 + Math.random() * 30
                });
            }
            explodeTriggered = true;
        }
        function updateDrawDissolve(progress) {
            const eased = easeInCubic(progress);
            ctx.save();
            ctx.globalAlpha = mainAlpha;
            ctx.shadowColor = '#ffb6d5';
            ctx.shadowBlur = 8;
            for (let i = 0; i < dissolveDots.length; i++) {
                const p = dissolveDots[i];
                const localProgress = Math.max(0, (eased - p.delay) / (1 - p.delay));
                if (localProgress <= 0) continue;
                const y = p.y + p.vy * localProgress * 120 + 0.5 * p.gravity * (localProgress * 120) ** 2;
                const x = p.x + p.vx * localProgress * 40;
                const alpha = Math.max(0, 1 - localProgress);
                ctx.globalAlpha = alpha * 0.9 * mainAlpha;
                ctx.fillStyle = 'rgba(255, 240, 248, 1)';
                ctx.beginPath();
                ctx.arc(x, y, dotRadius, 0, PI2);
                ctx.fill();
            }
            ctx.restore();
        }
        function updateDrawExplode() {
            ctx.save();
            for (let p of explodeHearts) {
                p.vy += p.gravity;
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.008;
                p.vx *= 0.99;
                if (p.alpha <= 0) continue;
                ctx.globalAlpha = Math.max(0, p.alpha) * mainAlpha;
                ctx.fillStyle = `hsl(${p.hue}, 85%, 75%)`;
                ctx.shadowColor = `hsl(${p.hue}, 90%, 65%)`;
                ctx.shadowBlur = 6;
                drawMiniHeart(p.x, p.y, p.size);
            }
            ctx.restore();
        }

        // “我喜欢你”点阵
        const loveText = '我喜欢你';
        let loveTextSize = 0;
        let loveDots = [];
        function createLoveDots() {
            loveDots = [];
            loveTextSize = Math.min(canvas.width * 0.22, 190);
            const off = document.createElement('canvas');
            const octx = off.getContext('2d');
            off.width = canvas.width;
            off.height = canvas.height;
            octx.fillStyle = '#fff';
            octx.font = `${loveTextSize}px "STXingkai", "华文行楷", "KaiTi", "楷体", serif`;
            octx.textAlign = 'center';
            octx.textBaseline = 'middle';
            octx.fillText(loveText, CX(), CY());
            const imgData = octx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let y = 0; y < canvas.height; y += dotSpacing) {
                for (let x = 0; x < canvas.width; x += dotSpacing) {
                    const alpha = data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        const angle = Math.random() * PI2;
                        const dist = 200 + Math.random() * 400;
                        loveDots.push({
                            targetX: x,
                            targetY: y,
                            startX: CX() + Math.cos(angle) * dist,
                            startY: CY() + Math.sin(angle) * dist
                        });
                    }
                }
            }
        }
        function drawLoveGather(progress) {
            const eased = easeOutCubic(progress);
            ctx.save();
            ctx.globalAlpha = mainAlpha;
            ctx.shadowColor = '#ffc9dd';
            ctx.shadowBlur = 10;
            for (let p of loveDots) {
                const x = p.startX + (p.targetX - p.startX) * eased;
                const y = p.startY + (p.targetY - p.startY) * eased;
                const alpha = 0.4 + eased * 0.55;
                ctx.globalAlpha = alpha * mainAlpha;
                ctx.fillStyle = 'rgba(255, 245, 250, 1)';
                ctx.beginPath();
                ctx.arc(x, y, dotRadius, 0, PI2);
                ctx.fill();
            }
            ctx.restore();
        }

        // 心跳爱心
        let heartDots = [];
        let heartTime = 0;
        const heartOutlineCount = 220;
        function createHeartOutlineDots() {
            heartDots = [];
            const scale = Math.min(canvas.width, canvas.height) * 0.028;
            const cx = CX();
            const cy = CY();
            for (let i = 0; i < heartOutlineCount; i++) {
                const t = (i / heartOutlineCount) * PI2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                heartDots.push({
                    targetX: x * scale + cx,
                    targetY: y * scale + cy
                });
            }
        }
        function getBreathScale(time) {
            return 1 + 0.07 * Math.sin(time * 0.5);
        }
        function drawBeatingHeart(time) {
            const cx = CX();
            const cy = CY();
            const scale = getBreathScale(time);
            ctx.save();
            ctx.globalAlpha = mainAlpha;
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);
            ctx.translate(-cx, -cy);
            for (let i = 0; i < heartDots.length; i++) {
                const p = heartDots[i];
                const ratio = i / heartDots.length;
                const r = 220 + Math.floor(ratio * 30);
                const g = 160 + Math.floor(ratio * 30);
                const b = 170 + Math.floor(ratio * 20);
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowColor = 'rgba(255, 180, 190, 0.6)';
                ctx.shadowBlur = 5;
                drawMiniHeart(p.targetX, p.targetY, 6.5);
            }
            ctx.restore();
        }
        function drawHeartRipple(time) {
            const cx = CX();
            const cy = CY();
            const baseSize = Math.min(canvas.width, canvas.height) * 0.18;
            const phase = (time * 0.33) % 1;
            const rippleSize = baseSize + phase * baseSize * 1.2;
            const alpha = (1 - phase) * 0.25;
            ctx.save();
            ctx.globalAlpha = alpha * mainAlpha;
            const grad = ctx.createRadialGradient(cx, cy, rippleSize * 0.7, cx, cy, rippleSize);
            grad.addColorStop(0, 'rgba(255, 180, 200, 0)');
            grad.addColorStop(0.6, 'rgba(255, 180, 200, 0.3)');
            grad.addColorStop(1, 'rgba(255, 180, 200, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(cx, cy, rippleSize, 0, PI2);
            ctx.fill();
            ctx.restore();
        }

        // 最终文字
        const finalText = '可以做我女朋友嘛';
        let finalTextSize = 0;
        function drawFinalText(progress) {
            const cx = CX();
            const cy = CY();
            finalTextSize = Math.min(canvas.width * 0.075, 66);
            const eased = easeOutCubic(progress);
            
            const charCount = Math.floor(finalText.length * eased);
            const showText = finalText.substring(0, charCount);
            
            const bobY = Math.sin(Date.now() * 0.002) * 3;
            ctx.save();
            ctx.translate(cx, cy + bobY);
            ctx.translate(-cx, -cy - bobY);
            ctx.globalAlpha = mainAlpha;
            
            const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 180);
            glowGrad.addColorStop(0, 'rgba(255, 200, 220, 0.18)');
            glowGrad.addColorStop(1, 'rgba(255, 200, 220, 0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, 180, 0, PI2);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${finalTextSize}px "Microsoft YaHei", "PingFang SC", "黑体", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffb6d5';
            ctx.shadowBlur = 16;
            ctx.fillText(showText, cx, cy + finalTextSize * 0.03);
            
            if (charCount < finalText.length) {
                const cursorAlpha = 0.5 + 0.5 * Math.sin(Date.now() * 0.01);
                ctx.globalAlpha = cursorAlpha * mainAlpha;
                ctx.fillRect(cx + ctx.measureText(showText).width / 2 + 5, cy - finalTextSize*0.4, 3, finalTextSize*0.8);
            }
            ctx.restore();
        }

        function updateRain() {
            for (let i = 0; i < drops.length; i++) {
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) {
                    drops[i] = Math.floor(Math.random() * -20);
                }
                drops[i] += dropSpeeds[i] || 1;
            }
        }
        function drawRainDim() {
            ctx.save();
            ctx.font = `${fontSize}px monospace`;
            ctx.globalAlpha = 0.25 * mainAlpha;
            for (let i = 0; i < drops.length; i++) {
                const text = letters[i % letters.length];
                const x = i * fontSize;
                const y = drops[i] * fontSize;
                if (y < -fontSize || y > canvas.height + fontSize) continue;
                const hue = 335 + (i % 8) * 3;
                ctx.fillStyle = `hsl(${hue}, 70%, 75%)`;
                ctx.fillText(text, x, y);
            }
            ctx.restore();
        }

        function drawGatherToHeart(progress) {
            const t = easeInOutQuad(progress);
            const heartLen = heartDots.length;
            ctx.save();
            ctx.globalAlpha = mainAlpha;
            const r = 255;
            const g = Math.floor(245 * (1 - t) + 190 * t);
            const b = Math.floor(250 * (1 - t) + 175 * t);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.95)`;
            ctx.shadowColor = 'rgba(255, 180, 195, 0.5)';
            ctx.shadowBlur = 8;
            for (let i = 0; i < loveDots.length; i++) {
                const start = loveDots[i];
                const end = heartDots[i % heartLen];
                const x = start.targetX + (end.targetX - start.targetX) * t;
                const y = start.targetY + (end.targetY - start.targetY) * t;
                ctx.beginPath();
                ctx.arc(x, y, dotRadius, 0, PI2);
                ctx.fill();
            }
            ctx.restore();
        }

        // ==================== 主循环 ====================
        let lastCountdownSec = -1;
        function animate(currentTime) {
            if (!lastFrameTime) lastFrameTime = currentTime;
            const delta = currentTime - lastFrameTime;
            lastFrameTime = currentTime;

            rainTimer += delta;
            if (rainTimer >= 95) {
                rainTimer -= 95;
                updateRain();
            }

            // 拖影效果
            ctx.fillStyle = 'rgba(5, 10, 30, 0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星空和流星一直存在
            drawStars();
            updateDrawMeteors();

            // ========== 倒计时阶段 ==========
            if (gameState === 'countdown') {
                const elapsed = Date.now() - countdownStartTime;
                const sec = Math.floor(elapsed / 1000);

                // 背景粒子提前淡入 (倒计时结束时 mainAlpha = 1)
                mainAlpha = Math.min(1, elapsed / 3000);

                if (sec !== lastCountdownSec && sec < 3) {
                    lastCountdownSec = sec;
                    if (sec === 0) createHeartFirework();
                    if (sec === 1) createStarFirework();
                    if (sec === 2) createColorFirework();
                }

                updateDrawFireworks();

                if (elapsed < 3000) {
                    const num = 3 - sec;
                    drawCountdownNumber(num);
                }

                if (elapsed >= 3000) {
                    gameState = 'main';
                    startTime = Date.now();
                }
            }

            // ========== 主动画阶段 ==========
            if (gameState === 'main') {
                const elapsed = Date.now() - startTime;

                // 背景粒子绘制（此时 mainAlpha 已经为1）
                updateDrawFallHearts();
                updateDrawFireflies();
                drawRainDim();

                if (elapsed >= STAGE0_END && elapsed < STAGE1_END) {
                    const progress = (elapsed - STAGE0_END) / (STAGE1_END - STAGE0_END);
                    drawNameSweep(progress);
                }
                else if (elapsed >= STAGE1_END && elapsed < STAGE2_END) {
                    if (dissolveDots.length === 0) initDissolve();
                    const progress = (elapsed - STAGE1_END) / (STAGE2_END - STAGE1_END);
                    updateDrawDissolve(progress);
                    if (progress > 0.25 && !explodeTriggered) createHeartExplosion();
                    if (explodeTriggered) updateDrawExplode();
                }
                else if (elapsed >= STAGE2_END && elapsed < STAGE3_END) {
                    const progress = (elapsed - STAGE2_END) / (STAGE3_END - STAGE2_END);
                    drawLoveGather(progress);
                }
                else if (elapsed >= STAGE3_END && elapsed < STAGE4_END) {
                    const progress = (elapsed - STAGE3_END) / (STAGE4_END - STAGE3_END);
                    drawGatherToHeart(progress);
                }
                else if (elapsed >= STAGE4_END) {
                    heartTime += delta / 1000;
                    drawHeartRipple(heartTime);
                    drawBeatingHeart(heartTime);
                    if (elapsed >= TEXT_START) {
                        const raw = Math.min((elapsed - TEXT_START) / TEXT_DURATION, 1);
                        drawFinalText(raw);
                    }
                }

                // 残留烟花继续
                updateDrawFireworks();
            }

            requestAnimationFrame(animate);
        }

        // ==================== 开始按钮 ====================
        startBtn.addEventListener('click', () => {
            // 播放音乐
            try {
                if (bgMusic) {
                    bgMusic.currentTime = 0;
                    const playPromise = bgMusic.play();
                    if (playPromise) {
                        playPromise.catch(() => {});
                    }
                }
            } catch(e) {}
            
            cover.classList.add('hide');
            
            // 延迟 800ms 后进入倒计时，给封面淡出动画时间
            setTimeout(() => {
                gameState = 'countdown';
                countdownStartTime = Date.now();
                lastCountdownSec = -1;
            }, 800);
        });

        // ==================== 初始化 ====================
        function init() {
            resizeCanvas();
            createStars();
            createSecretDots();
            createFallHearts();
            createFireflies();
            createNameDots();
            createLoveDots();
            createHeartOutlineDots();
            
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            requestAnimationFrame(animate);
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                resizeCanvas();
                initRain();
                explodeTriggered = false;
                dissolveDots = [];
                createStars();
                createSecretDots();
                createFallHearts();
                createFireflies();
                createNameDots();
                createLoveDots();
                createHeartOutlineDots();
            }, 200);
        });

        window.addEventListener('load', init);
    })();
    </script>
</body>
</html>
